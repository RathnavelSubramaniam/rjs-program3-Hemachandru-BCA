name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest

    if: github.actor != 'github-classroom[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Odd/Even Tests
        id: oddeven
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Odd/Even Tests
          setup-command: ""
          command: npm test
          timeout: 10
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          ODDEVEN_RESULTS: "${{ steps.oddeven.outputs.result }}"
        with:
          runners: oddeven
